# CodeRabbit Configuration
# https://docs.coderabbit.ai/configuration/overview

# Review settings
reviews:
  # Auto-review all PRs
  auto_review:
    enabled: true
  # High-level summary of the PR
  high_level_summary: true
  # Xyph does not enforce blanket docstring coverage. Keep this signal off so
  # review focuses on behavioral, architectural, and protocol risks.
  pre_merge_checks:
    docstrings:
      mode: "off"

# Chat with CodeRabbit
chat:
  auto_reply: true
